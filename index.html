    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --black:      #090909;
            --orange:     #F97316;
            --orange-mid: rgba(249, 115, 22, 0.18);
            --orange-dim: rgba(249, 115, 22, 0.05);
            --white:      #F0EBE3;
            --gray:       #4A4A4A;
            --rule:       #1C1C1C;
        }

        html, body {
            height: 100%;
        }

        body {
            font-family: 'IBM Plex Mono', 'Courier New', monospace;
            background-color: var(--black);
            color: var(--white);
            overflow: hidden;
        }

        /* Blueprint grid */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(249, 115, 22, 0.025) 1px, transparent 1px),
                linear-gradient(90deg, rgba(249, 115, 22, 0.025) 1px, transparent 1px),
                linear-gradient(rgba(249, 115, 22, 0.055) 1px, transparent 1px),
                linear-gradient(90deg, rgba(249, 115, 22, 0.055) 1px, transparent 1px);
            background-size: 24px 24px, 24px 24px, 120px 120px, 120px 120px;
            pointer-events: none;
            z-index: 0;
        }

        /* Noise grain */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
            opacity: 0.032;
            pointer-events: none;
            z-index: 0;
        }

        /* Caution stripes */
        .caution {
            position: fixed;
            left: 0;
            right: 0;
            height: 4px;
            background: repeating-linear-gradient(
                -60deg,
                var(--orange)  0px,
                var(--orange)  9px,
                var(--black)   9px,
                var(--black)   18px
            );
            z-index: 10;
        }
        .caution-top    { top: 0; }
        .caution-bottom { bottom: 0; }

        /* Layout */
        .layout {
            position: relative;
            z-index: 1;
            display: grid;
            grid-template-rows: auto 1fr auto;
            height: 100vh;
            padding: 2rem 2.75rem;
            max-width: 1440px;
            margin: 0 auto;
        }

        /* Header */
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-top: 1.25rem;
            animation: fadein 0.5s ease-out both;
        }

        .wordmark {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.45rem;
            letter-spacing: 0.14em;
            color: var(--white);
        }
        .wordmark-accent { color: var(--orange); }

        .status-tag {
            display: flex;
            align-items: center;
            gap: 0.65rem;
            font-size: 0.6rem;
            letter-spacing: 0.22em;
            color: var(--orange);
            border: 1px solid rgba(249, 115, 22, 0.45);
            padding: 0.4rem 0.9rem;
            text-transform: uppercase;
        }

        .blink-dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: var(--orange);
            animation: blink 1.4s step-end infinite;
        }

        /* Hero */
        .hero {
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 1rem 0 2rem;
        }

        .section-label {
            display: flex;
            align-items: center;
            gap: 0.9rem;
            font-size: 0.62rem;
            letter-spacing: 0.32em;
            color: var(--gray);
            text-transform: uppercase;
            margin-bottom: 2.75rem;
            animation: fadein 0.5s ease-out 0.15s both;
        }
        .section-label::before {
            content: '//';
            color: var(--orange);
            font-weight: 500;
            letter-spacing: 0;
        }
        .section-label::after {
            content: '';
            display: block;
            width: 80px;
            height: 1px;
            background: var(--rule);
        }

        h1 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(5.5rem, 17.5vw, 17rem);
            line-height: 0.87;
            letter-spacing: 0.01em;
        }

        .h1-line {
            display: block;
            overflow: hidden;
        }

        .h1-inner {
            display: block;
            animation: slideup 1s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        .h1-line:nth-child(1) .h1-inner { animation-delay: 0.3s; }
        .h1-line:nth-child(2) .h1-inner {
            animation-delay: 0.52s;
            color: var(--orange);
        }

        .tagline {
            margin-top: 3rem;
            font-size: 0.72rem;
            line-height: 1.85;
            color: var(--gray);
            letter-spacing: 0.06em;
            animation: fadein 0.5s ease-out 1.05s both;
        }

        .cursor {
            display: inline-block;
            width: 0.55ch;
            height: 0.85em;
            background: var(--orange);
            vertical-align: middle;
            margin-left: 1px;
            animation: blink 0.85s step-end infinite;
        }

        /* Footer */
        footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 0.58rem;
            color: var(--gray);
            letter-spacing: 0.18em;
            text-transform: uppercase;
            padding-top: 1.25rem;
            padding-bottom: 1.5rem;
            border-top: 1px solid var(--rule);
            animation: fadein 0.5s ease-out 1.25s both;
        }

        /* Keyframes */
        @keyframes slideup {
            from {
                opacity: 0;
                transform: translateY(105%);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadein {
            from { opacity: 0; }
            to   { opacity: 1; }
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50%       { opacity: 0; }
        }

        /* Mobile */
        @media (max-width: 768px) {
            body { overflow-y: auto; }

            .layout {
                height: auto;
                min-height: 100vh;
                padding: 1.5rem 1.5rem;
            }

            header { padding-top: 0.75rem; }

            .wordmark { font-size: 1.15rem; }

            .status-tag {
                font-size: 0.52rem;
                padding: 0.35rem 0.7rem;
                gap: 0.5rem;
            }

            h1 { font-size: clamp(4.5rem, 23vw, 7rem); }

            .section-label { margin-bottom: 2rem; }

            .tagline { margin-top: 2rem; }

            footer {
                flex-direction: column;
                align-items: flex-start;
                gap: 0.4rem;
            }
        }

        @media (max-width: 480px) {
            .layout { padding: 1.25rem; }
            h1 { font-size: clamp(3.75rem, 24vw, 5.5rem); }
        }
    </style>
</head>
<body>
    <div class="caution caution-top"></div>

            </div>
        </header>

        <main class="hero">

            <h1>
                <span class="h1-line"><span class="h1-inner">COMING</span></span>
                <span class="h1-line"><span class="h1-inner">SOON.</span></span>
            </h1>
            <p class="tagline">
                Something is being built.<br>
                We're not ready to talk about it yet.<span class="cursor"></span>
            </p>
        </main>

        <footer>
            <span>&copy; 2026 ToolboxLabs LLC</span>
            <span>toolboxlabs.dev</span>
        </footer>
    </div>
</body>
